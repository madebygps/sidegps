name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync frontend to static
        run: cp frontend/*.html frontend/*.css frontend/*.js frontend/*.json backend/static/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        working-directory: backend
        run: az webapp up --name sidegps --runtime "PYTHON:3.12" --sku F1
